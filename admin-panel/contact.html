<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact Hushh</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #080808;
        --panel: #111111;
        --text: #f6f6f6;
        --muted: rgba(255, 255, 255, 0.62);
        --line: rgba(255, 255, 255, 0.12);
        --accent: #8b5cf6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 28px;
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0 22px;
        background: var(--accent);
        color: white;
        font-weight: 700;
        text-decoration: none;
      }

      .status {
        margin-top: 16px;
        color: var(--muted);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Contact Hushh</h1>
      <p>Use the current contact link shared by the Hushh team.</p>
      <a id="contactLink" href="https://calendly.com/contact-hushhapp/30min" rel="noopener noreferrer">Open Contact Link</a>
      <div id="status" class="status">Loading latest link...</div>
    </main>

    <script>
      const contactLink = document.querySelector('#contactLink');
      const status = document.querySelector('#status');

      loadContactLink();

      async function loadContactLink() {
        try {
          const response = await fetch('/api/settings');
          if (!response.ok) throw new Error('Could not load contact settings.');

          const settings = await response.json();
          if (settings.contactUrl) {
            contactLink.href = settings.contactUrl;
            status.textContent = 'Latest contact link is ready.';
            return;
          }

          status.textContent = 'Using default contact link.';
        } catch {
          status.textContent = 'Using default contact link.';
        }
      }
    </script>
  </body>
</html>
